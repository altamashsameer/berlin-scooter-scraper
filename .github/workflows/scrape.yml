name: Berlin Scooter Data Scraper

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape_and_commit:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Gives explicit write permission to the token

    steps:
    # 1. Pull down your repository code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests

    # 4. Run the scraper loop
    - name: Run 3-minute loop scraper
      run: python scraper.py

    # 5. Securely save the changes using a dedicated GitHub Action
    - name: Commit and push changes safely
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Automated data update: New Berlin Scooter Snapshot"
        file_pattern: 'berlin_scooters_raw_data.csv'
