name: Berlin Scooter Data Scraper

on:
  schedule:
    - cron: '0 * * * *'  # Triggers automatically at the start of every hour
  workflow_dispatch:     # Allows you to click a button to start it manually whenever you want

jobs:
  scrape_and_commit:
    runs-on: ubuntu-latest
    steps:
    
    # 1. Pull down your repository code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up Python on the virtual machine
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install necessary data packages
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests

    # 4. Run the script (this block will take exactly 1 hour to execute)
    - name: Run 3-minute loop scraper
      run: python scraper.py

    # 5. Push the updated CSV file back into your GitHub repo
    - name: Commit and push changes
      run: |
        git config --global user.name "Berlin Data Bot"
        git config --global user.email "bot@berlindatabot.local"
        git add berlin_scooters_raw_data.csv
        # Only commit if the file actually changed to avoid errors
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated data update: $(date)" && git push)
